<!DOCTYPE html>
<html>

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>Counter App</title>
 <link rel="stylesheet" href="home.css">
</head>
<body>
   <div class="container">
       <h1> SB Counter App</h1>
      <h2 class="message" id="count">0</h2>
     <div class="btns-counter">
      <button id="decrease">Decrease</button>
      <button id="reset">Reset</button>
      <button id="increase">Increase</button>
     </div>
     <div class="initial-set">
      <input type="text" name="initial-input" id="initial" placeholder="Enter Initial">
      <button id="initial-btn">Set Initial Count</button>
     </div>
     <p id="display"></p>
   </div>
   <script src="home.js"></script>
</body>
</html>
